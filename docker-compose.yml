services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build:
      context: .
      dockerfile: infra/backend.Dockerfile
    env_file:
      - .env
    environment:
      # Inside the Compose network the backend reaches Mongo by service name,
      # not the localhost URI used for native local runs in .env.
      - MONGODB_URI=mongodb://mongo:27017/mentriq360
      # Local-dev settings: no forced HTTPS redirect / secure-only cookies,
      # so the app is usable over plain http://localhost.
      - DJANGO_SETTINGS_MODULE=config.settings.local
      # Keep the internal SQLite (Django users / super-admin) on a persistent
      # volume so it survives container rebuilds.
      - DJANGO_SQLITE_PATH=/app/data/db.sqlite3
    volumes:
      - backend-sqlite:/app/data
    command: >
      sh -c "python manage.py migrate &&
      gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4 --timeout 120"
    ports:
      - "8000:8000"
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_started

  web:
    build:
      context: .
      dockerfile: infra/web.Dockerfile
    env_file:
      - .env
    command: npm run dev
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  mongo-data:
  backend-sqlite:
